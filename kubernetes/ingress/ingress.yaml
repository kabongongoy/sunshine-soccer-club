# The ingress controller runs as NodePort on your cluster.
# HTTP is available on port 32300 via any node IP (e.g. http://192.168.1.80:32300).
# For hostname-based access add to your hosts file:
#   192.168.1.80   soccer.local
# then browse to http://soccer.local:32300
#
# NOTE: If the `wordpress` namespace still has an ingress for soccer.local, remove it first:
#   kubectl delete ingress wordpress-ingress -n wordpress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-ingress
  namespace: soccer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: soccer.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress
                port:
                  number: 80
